backend:
  name: github
  repo: fatahilah-mr/gateway
  branch: main
  base_url: https://links.fatahmr.my.id
  auth_endpoint: /api/auth

media_folder: public/images
public_folder: /images

collections:
  - name: "config"
    label: "Site Configuration"
    files:
      - name: "main"
        label: "⚙️ Main Config"
        file: "public/content/config.json"
        extension: json
        format: json
        fields:
          - { label: "Full Name (SEO)", name: "name", widget: "string" }
          - { label: "Short Name (header display)", name: "shortName", widget: "string" }
          
          - label: "🇬🇧 English"
            name: "en"
            widget: "object"
            fields:
              - { label: "Title (H1)", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Hint Text", name: "hint", widget: "string" }
              - { label: "Card Hint Text", name: "cardHint", widget: "string" }
              - { label: "Footer", name: "footer", widget: "string" }
          
          - label: "🇮🇩 Indonesian"
            name: "id"
            widget: "object"
            fields:
              - { label: "Title (H1)", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Hint Text", name: "hint", widget: "string" }
              - { label: "Card Hint Text", name: "cardHint", widget: "string" }
              - { label: "Footer", name: "footer", widget: "string" }
          
          - label: "🃏 Link Cards"
            name: "links"
            widget: "list"
            summary: "{{fields.en_title}} → {{fields.url}}"
            fields:
              - { label: "ID (unik, tanpa spasi)", name: "id", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - label: "Icon"
                name: "icon"
                widget: "select"
                options:
                  - { label: "🌐 Web / Globe", value: "web" }
                  - { label: "📖 Book / Blog", value: "book" }
                  - { label: "📝 Article", value: "article" }
                  - { label: "💻 Code", value: "code" }
                  - { label: "GitHub", value: "github" }
                  - { label: "LinkedIn", value: "linkedin" }
                  - { label: "WhatsApp", value: "whatsapp" }
                  - { label: "YouTube", value: "youtube" }
                  - { label: "Instagram", value: "instagram" }
                  - { label: "Twitter / X", value: "twitter" }
                  - { label: "Facebook", value: "facebook" }
                  - { label: "Telegram", value: "telegram" }
                  - { label: "✉️ Email", value: "email" }
                  - { label: "💬 Chat / Message", value: "chat" }
                  - { label: "📱 Phone", value: "phone" }
                  - { label: "💼 Portfolio / Work", value: "portfolio" }
                  - { label: "🧳 Business", value: "work" }
                  - { label: "🎓 School / Education", value: "school" }
                  - { label: "🛒 Shop", value: "shop" }
                  - { label: "▶️ Video", value: "video" }
                  - { label: "🎙️ Podcast", value: "podcast" }
                  - { label: "🎵 Music", value: "music" }
                  - { label: "📷 Photo", value: "photo" }
                  - { label: "👤 Person / Profile", value: "person" }
                  - { label: "🎮 Game", value: "game" }
                  - { label: "✈️ Travel", value: "travel" }
                  - { label: "⭐ Star", value: "star" }
                  - { label: "❤️ Heart", value: "heart" }
                  - { label: "↗️ Open in New", value: "open" }
                  - { label: "🔗 Generic Link", value: "link" }
              - { label: "🇬🇧 Title (English)", name: "en_title", widget: "string" }
              - { label: "🇬🇧 Description (English)", name: "en_description", widget: "string" }
              - { label: "🇮🇩 Title (Indonesian)", name: "id_title", widget: "string" }
              - { label: "🇮🇩 Description (Indonesian)", name: "id_description", widget: "string" }
